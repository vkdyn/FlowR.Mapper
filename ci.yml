name: CI/CD - FlowR.Mapper Build, Test & Publish

on:
  push:
    branches: [main]
    tags:
      - 'mapper-v*.*.*'
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['6.0.x', '7.0.x', '8.0.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test tests/FlowR.Mapper.Tests/FlowR.Mapper.Tests.csproj --configuration Release --no-build --verbosity normal

  publish:
    name: Publish to NuGet
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/mapper-v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/mapper-v}" >> $GITHUB_OUTPUT
      - name: Pack
        run: dotnet pack src/FlowR.Mapper/FlowR.Mapper.csproj --configuration Release -p:Version=${{ steps.version.outputs.VERSION }} --output ./nupkg
      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/FlowR.Mapper.${{ steps.version.outputs.VERSION }}.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
